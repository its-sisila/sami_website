version: '3.8'

services:
  # Backend API
  api:
    build: ./services/api
    container_name: sami-api
    ports:
      - "8000:8000"
    env_file:
      - ./services/api/.env
    environment:
      - PORT=8000
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

# Note: Frontend apps (landing, dashboard) are deployed to Vercel
# This docker-compose is primarily for local development and API deployment
