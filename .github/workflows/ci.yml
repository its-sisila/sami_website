name: SAMI CI Pipeline

on:
  push:
    branches: [main, dashboard]
  pull_request:
    branches: [main, dashboard]

jobs:
  # ============================================================
  # Backend Tests (FastAPI + Python)
  # ============================================================
  backend-tests:
    name: Backend Tests & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run tests with coverage
        env:
          JWT_SECRET: "ci-test-secret-not-real"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_KEY: "test-anon-key"
          SUPABASE_SERVICE_KEY: "test-service-key"
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=45 \
            -v

      - name: Security scan (bandit)
        run: |
          bandit -r app/ -ll --format json --output bandit-report.json || true
          bandit -r app/ -ll

  # ============================================================
  # Frontend Build & Lint (Next.js Dashboard)
  # ============================================================
  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: npm run build

  # ============================================================
  # Docker Build Check
  # ============================================================
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build --no-cache -t sami-api-test ./services/api

      - name: Verify image size is reasonable
        run: |
          SIZE=$(docker image inspect sami-api-test --format='{{.Size}}')
          echo "Image size: $((SIZE / 1024 / 1024)) MB"
          # Fail if image is larger than 1GB (something is wrong)
          if [ "$SIZE" -gt 1073741824 ]; then
            echo "ERROR: Docker image is too large!"
            exit 1
          fi
